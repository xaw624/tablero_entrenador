# nginx vhost — Tablero del Entrenador
# Cloudflare en modo NUBE GRIS (DNS only): el tráfico llega directo al origen,
# nginx termina TLS con Let's Encrypt (certbot). NO proxiado por Cloudflare.
#
# Instalación:
#   sudo cp deploy/nginx/fitness.streamlytics.stream.conf /etc/nginx/sites-available/fitness.streamlytics.stream
#   sudo ln -s /etc/nginx/sites-available/fitness.streamlytics.stream /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d fitness.streamlytics.stream   # emite/instala el cert y completa el bloque 443
#   sudo nginx -t && sudo systemctl reload nginx
#
# Nota: certbot reescribe parte de este archivo (añade ssl_certificate y el redirect 80->443).
# El bloque de abajo ya deja todo listo para que certbot solo inserte las rutas del certificado.

server {
    listen 80;
    listen [::]:80;
    server_name fitness.streamlytics.stream;

    # certbot HTTP-01 usa /.well-known/acme-challenge (funciona por ser nube gris).
    # Tras emitir el cert, certbot añade aquí el redirect 301 a https.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fitness.streamlytics.stream;

    # --- TLS (rutas gestionadas por certbot) ---
    # ssl_certificate     /etc/letsencrypt/live/fitness.streamlytics.stream/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fitness.streamlytics.stream/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Seguridad ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # Permite subir backups grandes vía POST /api/import/backup.json
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 512;

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # uvicorn --proxy-headers lo usa para el esquema/secure-cookie
        proxy_read_timeout 60s;
    }
}
